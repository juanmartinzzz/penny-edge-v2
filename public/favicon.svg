<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    .rim,
    .wedge {
      stroke: #141413;
      fill: #141413;
    }
    .rim {
      fill: none;
    }
    .inner {
      stroke: #141413;
      fill: none;
      opacity: 0.55;
    }
    @media (prefers-color-scheme: dark) {
      .rim,
      .wedge {
        stroke: #f5f5f5;
        fill: #f5f5f5;
      }
      .rim {
        fill: none;
      }
      .inner {
        stroke: #f5f5f5;
      }
    }
  </style>
  <!-- Penny disc + hard edge — matches PennyEdgeMark -->
  <circle class="rim" cx="16" cy="16" r="13.5" stroke-width="2" />
  <circle class="inner" cx="16" cy="16" r="9.25" stroke-width="1.25" />
  <path
    class="wedge"
    d="M22.8 6.2 27.2 16l-4.4 9.8-3.1-1.4L23.6 16l-3.9-8.4 3.1-1.4Z"
  />
</svg>
